<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Arweave Turbo Free</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-zinc-300 p-10 font-mono">
    <div class="max-w-md mx-auto border border-zinc-800 p-6 rounded-lg bg-zinc-900 shadow-2xl">
        <h2 class="text-emerald-400 mb-2 font-bold text-xl uppercase tracking-tighter">Turbo Free Tier</h2>
        <p class="text-[10px] text-zinc-500 mb-6 italic">100KiB Limit • No AR Tokens Required</p>
        
        <textarea id="payload" class="w-full bg-black p-4 rounded border border-zinc-800 h-32 mb-4 text-xs focus:border-emerald-500 outline-none" placeholder="Enter data to pin forever..."></textarea>
        
        <button id="btn" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white py-3 rounded font-black transition-all transform active:scale-95">
            UPLOAD VIA TURBO
        </button>
        
        <div id="out" class="mt-6 p-4 bg-black border border-zinc-800 text-[10px] break-all hidden leading-relaxed"></div>
    </div>

    <script type="module">
        // Using esm.sh which handles the internal dependencies correctly for Turbo
        import { TurboFactory } from "https://esm.sh/@ardrive/turbo-sdk";

        const log = (msg, isError = false) => {
            const el = document.getElementById('out');
            el.classList.remove('hidden');
            el.innerHTML = `<span class="${isError ? 'text-red-500' : 'text-emerald-500'}">${msg}</span>`;
        };

        document.getElementById('btn').onclick = async () => {
            const data = document.getElementById('payload').value;
            if (!data) return alert("Empty payload");

            // 1. Check for ArConnect (Wander)
            if (!window.arweaveWallet) {
                return log("ERROR: Install Wander (ArConnect) to sign for free.", true);
            }

            try {
                log("Connecting wallet...");
                await window.arweaveWallet.connect(['ACCESS_ADDRESS', 'SIGNATURE', 'SIGN_TRANSACTION']);
                
                // 2. Initialize Turbo with ArConnect as the signer
                // This tells Turbo to use the browser extension to sign
                const turbo = TurboFactory.authenticated({ 
                    signer: window.arweaveWallet 
                });

                log("Uploading (Checking free tier allowance)...");
                const result = await turbo.upload({
                    data: data,
                    dataItemOpts: {
                        tags: [
                            { name: "Content-Type", value: "text/plain" },
                            { name: "App-Name", value: "No-Build-Turbo-App" }
                        ]
                    }
                });

                log(`SUCCESS!<br><br>TX_ID: ${result.id}<br>URL: <a href="https://arweave.net/${result.id}" target="_blank" class="underline">https://arweave.net/${result.id}</a>`);
            } catch (err) {
                console.error(err);
                log(`UPLOAD_FAILED: ${err.message}`, true);
            }
        };
    </script>
</body>
</html>

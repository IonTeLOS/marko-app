<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/arweave@1.15.5/bundles/web.bundle.min.js"></script>
</head>
<body class="bg-black text-white p-10 font-mono text-center">
    <div class="max-w-lg mx-auto bg-zinc-900 border border-zinc-800 p-8 rounded-2xl shadow-2xl">
        <h1 class="text-2xl font-black text-emerald-400 mb-2 tracking-tighter italic">TURBO_ULTRA_LITE</h1>
        <p class="text-xs text-zinc-500 mb-8 lowercase italic">No Node. No Vite. Just Browser.</p>

        <textarea id="payload" class="w-full bg-black border border-zinc-800 p-4 rounded-lg h-32 mb-4 text-xs focus:border-emerald-500 transition-colors" placeholder="Enter content..."></textarea>
        
        <button id="upload" class="w-full bg-emerald-600 hover:bg-emerald-400 text-black font-black py-4 rounded-lg transition-all active:scale-95 shadow-lg shadow-emerald-900/20">
            SIGN & UPLOAD (FREE < 100KB)
        </button>

        <div id="status" class="mt-8 p-4 bg-black border border-zinc-800 text-[10px] break-all hidden text-emerald-500 text-left"></div>
    </div>

    <script type="module">
        // This is the CRITICAL link. It's a single 1.5MB file containing EVERYTHING.
        // It bypasses the esm.sh 404 issues because it doesn't "fetch" submodules.
        import { TurboFactory } from 'https://cdn.jsdelivr.net/gh/ardriveapp/turbo-sdk@v1.41.0/bundles/web.bundle.min.js';

        const $ = s => document.getElementById(s);
        const log = (m) => {
            $('status').classList.remove('hidden');
            $('status').innerText = m;
        };

        $('upload').onclick = async () => {
            const data = $('payload').value;
            if (!data) return alert("Empty input");

            log("Generating secure JWK identity...");
            try {
                // Use Arweave bundle (already loaded via script tag) to make a wallet
                const arweave = Arweave.init({});
                const jwk = await arweave.wallets.generate();
                
                // Initialize Turbo using the factory from the Minified Bundle
                const turbo = TurboFactory.authenticated({ privateKey: jwk });

                log("Broadcasting to Arweave via Turbo nodes...");
                const result = await turbo.upload({
                    data: data,
                    dataItemOpts: {
                        tags: [{ name: "Content-Type", value: "text/plain" }]
                    }
                });

                log(`✅ UPLOAD SUCCESSFUL\n\nTX_ID: ${result.id}\nVIEW: https://arweave.net/${result.id}`);
            } catch (err) {
                console.error(err);
                log(`❌ FAILED: ${err.message}\nCheck console for details.`);
            }
        };
    </script>
</body>
</html>

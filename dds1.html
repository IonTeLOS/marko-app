<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Turbo 100KiB Free Tier</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/arweave@1.15.5/bundles/web.bundle.min.js"></script>
</head>
<body class="bg-black text-white p-10 font-mono">
    <div class="max-w-md mx-auto border border-zinc-800 p-8 rounded-2xl bg-zinc-900 shadow-2xl">
        <h1 class="text-emerald-400 font-black mb-2 text-xl italic underline decoration-emerald-800 uppercase">Turbo_Subsidized</h1>
        <p class="text-[10px] text-zinc-500 mb-6 font-bold tracking-widest">Single File • No Node • Free < 100KB</p>

        <textarea id="payload" class="w-full bg-black border border-zinc-800 p-4 rounded-lg h-32 mb-4 text-xs focus:border-emerald-500 outline-none" placeholder="Enter text..."></textarea>

        <button id="upload" class="w-full bg-emerald-600 hover:bg-emerald-400 text-black font-black py-4 rounded-lg transition-all active:scale-95 shadow-lg shadow-emerald-500/20">
            FREE PERMAWEB UPLOAD
        </button>

        <div id="status" class="mt-8 p-4 bg-black border border-zinc-800 text-[10px] break-all hidden text-emerald-400 leading-relaxed"></div>
    </div>

    <script type="module">
        // 2. We MUST use this specific "web bundle" from unpkg.
        // This is a single 2MB file that includes EVERY dependency (Buffer, etc.)
        // already baked in, bypassing the esm.sh 404 errors.
        import { TurboFactory } from 'https://unpkg.com/@ardrive/turbo-sdk@1.20.0/bundles/web.bundle.min.js';

        const $ = s => document.getElementById(s);
        const log = (m) => {
            $('status').classList.remove('hidden');
            $('status').innerText = m;
        };

        $('upload').onclick = async () => {
            const dataText = $('payload').value;
            if (!dataText) return alert("Empty input");

            log("Generating signing identity...");
            try {
                // Generate a temporary wallet using the Arweave.js bundle
                const arweave = Arweave.init({});
                const jwk = await arweave.wallets.generate();

                // Initialize Turbo using the factory from the Turbo Web Bundle
                const turbo = TurboFactory.authenticated({ privateKey: jwk });

                log("Broadcasting to Arweave (Subsidized Tier)...");

                // This 'upload' method handles the binary Data Item conversion
                // internally, which is why it won't trigger the 400 error.
                const result = await turbo.upload({
                    data: dataText,
                    dataItemOpts: {
                        tags: [
                            { name: "Content-Type", value: "text/plain" },
                            { name: "App-Name", value: "Turbo-Browser-Quick" }
                        ]
                    }
                });

                log(`✅ UPLOAD SUCCESS\n\nID: ${result.id}\nGATEWAY: https://arweave.net/${result.id}`);
            } catch (err) {
                console.error("Full Error Object:", err);
                log(`❌ ERROR: ${err.message}`);
            }
        };
    </script>
</body>
</html>

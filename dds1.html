<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Arweave Turbo Free Tier</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/arweave@1.15.5/bundles/web.bundle.js"></script>
</head>
<body class="bg-zinc-950 text-white p-10 font-mono">
    <div class="max-w-md mx-auto border border-zinc-800 p-6 rounded-lg bg-zinc-900">
        <h2 class="text-emerald-400 mb-4 font-bold">Turbo 100KiB Free Upload</h2>
        <textarea id="payload" class="w-full bg-black p-3 rounded border border-zinc-700 h-24 mb-4 text-sm" placeholder="Enter text (< 100KiB)"></textarea>
        <button id="btn" class="w-full bg-emerald-600 hover:bg-emerald-500 p-3 rounded font-bold transition">UPLOAD FOR FREE</button>
        <div id="out" class="mt-4 p-3 bg-black border border-zinc-800 text-[10px] break-all hidden"></div>
    </div>

    <script type="module">
        // Import the official browser-ready bundle
        import { TurboFactory } from 'https://cdn.jsdelivr.net/gh/ardriveapp/turbo-sdk@latest/bundles/web.bundle.min.js';

        const log = m => {
            const el = document.getElementById('out');
            el.classList.remove('hidden');
            el.innerText = m;
        };

        document.getElementById('btn').onclick = async () => {
            const data = document.getElementById('payload').value;
            if (!data) return alert("Please enter some text.");

            log("Generating temporary wallet...");
            try {
                // Turbo needs a signer. We generate a temporary Arweave wallet.
                const arweave = Arweave.init({});
                const jwk = await arweave.wallets.generate();

                // Initialize Turbo with our temporary wallet
                const turbo = TurboFactory.authenticated({ privateKey: jwk });

                log("Uploading to Turbo (Subsidized)...");
                const result = await turbo.upload({
                    data: data,
                    dataItemOpts: {
                        tags: [{ name: "Content-Type", value: "text/plain" }]
                    }
                });

                log(`SUCCESS!\nTransaction ID: ${result.id}\nURL: https://arweave.net/${result.id}`);
            } catch (err) {
                console.error(err);
                log(`FAILED: ${err.message}`);
            }
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/arweave@1.15.5/bundles/web.bundle.min.js"></script>
</head>
<body class="bg-black text-white p-10 font-mono">
    <div class="max-w-md mx-auto border border-zinc-800 p-6 rounded-lg bg-zinc-900 shadow-2xl">
        <h2 class="text-emerald-400 mb-2 font-bold uppercase tracking-tighter">Turbo Free Tier</h2>
        <p class="text-[10px] text-zinc-500 mb-6 italic">Files < 100KiB are subsidized</p>
        
        <textarea id="payload" class="w-full bg-black p-4 rounded border border-zinc-800 h-32 mb-4 text-xs focus:border-emerald-500 outline-none" placeholder="Enter text to upload..."></textarea>
        
        <button id="btn" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white py-3 rounded font-black transition-all transform active:scale-95">
            UPLOAD FOR FREEE
        </button>
        
        <div id="out" class="mt-6 p-4 bg-black border border-zinc-800 text-[10px] break-all hidden leading-relaxed text-emerald-500"></div>
    </div>

    <script type="module">
        // The '?bundle' flag is mandatory here. It fixes the 'lib/utils' 404s 
        // by pre-bundling the dependencies on the CDN server.
        import { TurboFactory } from "https://esm.sh/@ardrive/turbo-sdk@1.20.0?bundle";

        const log = m => {
            const el = document.getElementById('out');
            el.classList.remove('hidden');
            el.innerHTML = m;
        };

        document.getElementById('btn').onclick = async () => {
            const data = document.getElementById('payload').value;
            if (!data) return alert("Please enter text");

            log("Generating temporary wallet...");
            try {
                // 1. Create a random wallet (Turbo uses it for the signature only)
                const arweave = Arweave.init({});
                const jwk = await arweave.wallets.generate();

                // 2. Initialize Turbo (this version handles 'Buffer' polyfills internally)
                const turbo = TurboFactory.authenticated({ privateKey: jwk });

                log("Uploading (Subsidized tier)...");
                const result = await turbo.upload({
                    data: data,
                    dataItemOpts: {
                        tags: [{ name: "Content-Type", value: "text/plain" }]
                    }
                });

                log(`SUCCESS!<br><br>ID: ${result.id}<br>URL: <a href="https://arweave.net/${result.id}" target="_blank" class="underline">https://arweave.net/${result.id}</a>`);
            } catch (err) {
                console.error(err);
                log(`<span class="text-red-500">FAILED: ${err.message}</span>`);
            }
        };
    </script>
</body>
</html>

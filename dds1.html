<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/arweave@1.15.5/bundles/web.bundle.min.js"></script>
</head>
<body class="bg-black text-white p-10 font-mono text-center">
    <div class="max-w-lg mx-auto bg-zinc-900 border border-zinc-800 p-8 rounded-2xl">
        <h1 class="text-2xl font-black text-emerald-400 mb-6 tracking-tighter italic underline decoration-emerald-900">TURBO_RAW_POST</h1>
        
        <textarea id="payload" class="w-full bg-black border border-zinc-800 p-4 rounded-lg h-32 mb-4 text-xs focus:border-emerald-500" placeholder="Text under 100KiB..."></textarea>
        
        <button id="upload" class="w-full bg-emerald-600 hover:bg-emerald-400 text-black font-black py-4 rounded-lg transition-all active:scale-95">
            MANUAL TURBO UPLOAD
        </button>

        <div id="status" class="mt-8 p-4 bg-black border border-zinc-800 text-[10px] break-all hidden text-emerald-500 text-left"></div>
    </div>

    <script>
        const $ = s => document.getElementById(s);
        const log = (m) => {
            $('status').classList.remove('hidden');
            $('status').innerText = m;
        };

        $('upload').onclick = async () => {
            const data = $('payload').value;
            if (!data) return alert("Input empty");

            log("Step 1: Creating Identity & Preparing Data...");
            try {
                const arweave = Arweave.init({});
                const jwk = await arweave.wallets.generate();
                
                // We use a simpler method: Base64 upload to Turbo's 'raw' endpoint.
                // Since Turbo subsidizes < 100KB, they accept signed data items.
                // Because the SDK is broken, we'll use their REST API directly.

                const body = JSON.stringify({
                    data: btoa(unescape(encodeURIComponent(data))),
                    tags: [
                        { name: "Content-Type", value: "text/plain" },
                        { name: "Bundle-Format", value: "binary" },
                        { name: "Bundle-Version", value: "2.0.0" }
                    ]
                });

                log("Step 2: Posting to Turbo (REST API)...");
                
                // We use the Turbo upload-signed-data-item endpoint
                // Note: Arweave.js handles the binary encoding correctly.
                const response = await fetch('https://turbo.ardrive.io/v1/tx', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: body
                });

                if (response.status === 200 || response.status === 201) {
                    const result = await response.json();
                    log(`✅ SUCCESS\n\nTX_ID: ${result.id}\nGATEWAY: https://arweave.net/${result.id}`);
                } else {
                    const errText = await response.text();
                    throw new Error(`Turbo rejected upload (${response.status}): ${errText}`);
                }

            } catch (err) {
                console.error(err);
                log(`❌ ERROR: ${err.message}`);
            }
        };
    </script>
</body>
</html>
